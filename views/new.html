<div class="bg-white border rounded p-6">
  <h1 class="text-xl font-semibold mb-4">Create Product</h1>
  {{ if .Error }}
    <div class="mb-4 rounded border border-red-200 bg-red-50 p-3 text-red-800">{{ .Error }}</div>
  {{ end }}

  <form method="post" action="/products" class="space-y-4">
    <div>
      <label class="block text-sm font-medium mb-1">Name</label>
      <input name="name" class="w-full border rounded p-2" placeholder="Product name" value="{{ .FormName }}" required />
    </div>

    <div>
      <label class="block text-sm font-medium mb-1">Price</label>
      <input name="price" type="number" step="0.01" class="w-full border rounded p-2" placeholder="0.00" value="{{ .FormPrice }}" required />
    </div>

    <div>
      <label class="block text-sm font-medium mb-1">Quantity</label>
      <input name="quantity" type="number" min="0" step="1" class="w-full border rounded p-2" placeholder="0" value="{{ .FormQuantity }}" required />
    </div>

    <div class="flex gap-3">
      <button type="submit" class="px-4 py-2 rounded bg-black text-white">Create</button>
      <a href="/" class="px-4 py-2 rounded border">Cancel</a>
    </div>
  </form>
</div>
