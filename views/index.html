<div class="bg-white border rounded p-4">
  {{ if .Success }}
    <div class="mb-4 rounded border border-green-200 bg-green-50 p-3 text-green-800">{{ .Success }}</div>
  {{ end }}
  {{ if .Error }}
    <div class="mb-4 rounded border border-red-200 bg-red-50 p-3 text-red-800">{{ .Error }}</div>
  {{ end }}

  <form method="get" action="/" class="mb-4 flex gap-3">
    <input
      name="name"
      class="w-full border rounded p-2"
      placeholder="Filter by name"
      value="{{ .FilterName }}"
    />
    <button type="submit" class="px-4 py-2 rounded bg-black text-white">Filter</button>
    <a href="/" class="px-4 py-2 rounded border">Clear</a>
  </form>

  <div class="border rounded">
  <table class="w-full text-left">
    <thead>
      <tr class="border-b bg-gray-50">
        <th class="p-3">ID</th>
        <th class="p-3">Name</th>
        <th class="p-3">Price</th>
        <th class="p-3">Quantity</th>
        <th class="p-3">Actions</th>
      </tr>
    </thead>
    <tbody>
      {{ if .Products }}
        {{ range .Products }}
          <tr class="border-b">
            <td class="p-3">{{ .ID }}</td>
            <td class="p-3">{{ .Name }}</td>
            <td class="p-3">{{ printf "%.2f" .Price }}</td>
            <td class="p-3">{{ .Quantity }}</td>
            <td class="p-3">
              <a class="underline" href="/products/{{ .ID }}/edit">Edit</a>
              <form class="inline" method="post" action="/products/{{ .ID }}/delete" data-name="{{ .Name }}" onsubmit="return confirm('Do you want to delete ' + this.dataset.name + '?')">
                <button class="underline ml-3" type="submit">Delete</button>
              </form>
            </td>
          </tr>
        {{ end }}
      {{ else }}
        <tr>
          <td class="p-3" colspan="5">No products yet.</td>
        </tr>
      {{ end }}
    </tbody>
  </table>
  </div>
</div>
