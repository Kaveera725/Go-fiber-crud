<div class="bg-white border rounded p-6">
  <h1 class="text-xl font-semibold mb-4">Edit Product</h1>
  {{ if .Error }}
    <div class="mb-4 rounded border border-red-200 bg-red-50 p-3 text-red-800">{{ .Error }}</div>
  {{ end }}

  <form method="post" action="/products/{{ .Product.ID }}/update" class="space-y-4">
    <div>
      <label class="block text-sm font-medium mb-1">Name</label>
      <input name="name" class="w-full border rounded p-2" value="{{ if .FormName }}{{ .FormName }}{{ else }}{{ .Product.Name }}{{ end }}" required />
    </div>

    <div>
      <label class="block text-sm font-medium mb-1">Price</label>
      <input name="price" type="number" step="0.01" class="w-full border rounded p-2" value="{{ if .FormPrice }}{{ .FormPrice }}{{ else }}{{ printf "%.2f" .Product.Price }}{{ end }}" required />
    </div>

    <div>
      <label class="block text-sm font-medium mb-1">Quantity</label>
      <input name="quantity" type="number" min="0" step="1" class="w-full border rounded p-2" value="{{ if .FormQuantity }}{{ .FormQuantity }}{{ else }}{{ .Product.Quantity }}{{ end }}" required />
    </div>

    <div class="flex gap-3">
      <button type="submit" class="px-4 py-2 rounded bg-black text-white">Update</button>
      <a href="/" class="px-4 py-2 rounded border">Cancel</a>
    </div>
  </form>
</div>
